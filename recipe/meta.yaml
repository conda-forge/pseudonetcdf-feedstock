{% set version = "3.5.0" %}

package:
  name: pseudonetcdf
  version: {{ version }}

source:
  url: http://github.com/barronh/pseudonetcdf/archive/v{{ version }}.tar.gz
  sha256: 9050106b258ae37b1c756675bb3cf5e0b4e5e7f9baa55e63cc5274a1250aabac

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - pandas
    - netcdf4
    - scipy
    - pyyaml
    - matplotlib-base

test:
  requires:
  - python {{ python_min }}
  imports:
    - PseudoNetCDF
    - PseudoNetCDF.test

about:
  home: http://github.com/barronh/pseudonetcdf
  license: LGPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: PseudoNetCDF like NetCDF except for many scientific format backends
  doc_url: http://pseudonetcdf.readthedocs.io/
  dev_url: http://github.com/barronh/pseudonetcdf

extra:
  recipe-maintainers:
    - barronh
